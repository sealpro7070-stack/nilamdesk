<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nilam Auto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f7ff;
      color: #1a1a2e;
    }

    .header {
      background: #6C5CE7;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .header h1 { color: #fff; font-size: 15px; font-weight: 700; }
    .header p  { color: rgba(255,255,255,0.75); font-size: 11px; margin-top: 1px; }

    .body { padding: 16px; }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      background: #fff;
      border: 1px solid #e2e0f9;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 12px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green  { background: #00b894; }
    .dot.orange { background: #fdcb6e; }
    .dot.red    { background: #d63031; }
    .status-text { color: #555; line-height: 1.4; }

    label { display: block; font-size: 11px; font-weight: 600; color: #555; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      width: 100%; padding: 9px 11px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 13px; background: #fff; color: #1a1a2e;
      outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #6C5CE7; }
    .field { margin-bottom: 12px; }

    .btn {
      width: 100%; padding: 11px;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #6C5CE7; color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent; color: #6C5CE7;
      border: 1.5px solid #e2e0f9;
      font-size: 12px; padding: 8px; margin-top: 8px;
    }

    .msg {
      margin-top: 12px; padding: 10px 12px;
      border-radius: 8px; font-size: 12px; font-weight: 600; line-height: 1.5;
      display: none;
    }
    .msg.success { background: #d4edda; color: #155724; display: block; }
    .msg.error   { background: #f8d7da; color: #721c24; display: block; }

    .divider { border: none; border-top: 1px solid #e8e6f9; margin: 14px 0; }

    .settings-toggle {
      background: none; border: none; cursor: pointer;
      font-size: 11px; color: #888; text-decoration: underline;
      padding: 0; display: block; margin: 0 auto;
    }

    #settings-section { display: none; margin-top: 12px; }
    #settings-section.open { display: block; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </div>
    <div>
      <h1>Nilam Auto</h1>
      <p>AINS Session Saver</p>
    </div>
  </div>

  <div class="body">
    <!-- Status -->
    <div class="status-bar">
      <div class="dot" id="status-dot"></div>
      <span class="status-text" id="status-text">Checking page…</span>
    </div>

    <!-- Email -->
    <div class="field">
      <label>Your Nilam Auto Email</label>
      <input type="email" id="email" placeholder="student@gmail.com" />
    </div>

    <!-- Save session button -->
    <button class="btn btn-primary" id="save-btn" disabled>
      <svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
      </svg>
      Save Session
    </button>

    <div class="msg" id="msg"></div>

    <hr class="divider" />

    <button class="settings-toggle" id="settings-toggle">⚙ Backend URL settings</button>

    <div id="settings-section">
      <div class="field" style="margin-top:10px;">
        <label>Backend URL</label>
        <input type="url" id="backend-url" placeholder="https://your-app.up.railway.app" />
      </div>
      <button class="btn btn-ghost" id="save-settings-btn">Save Settings</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
